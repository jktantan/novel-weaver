version: "3.8"

# ══════════════════════════════════════════════════════════
# Novel Weaver — Infrastructure / 基础设施 / インフラ
# Start before gateway: 先启动此文件 / 先に起動:
#   docker compose -f infra.yml up -d
# ══════════════════════════════════════════════════════════

services:
  # ── PostgreSQL 16 + pgvector ──
  # CN 主数据存储+向量搜索 / JP 主データ保存+ベクトル検索 / EN Primary storage + vector search
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nw-postgres
    restart: unless-stopped
    networks: [novel-weaver-network]
    environment:
      POSTGRES_DB: ${PG_DB:-novel_weaver}
      POSTGRES_USER: ${PG_USER:-weaver}
      POSTGRES_PASSWORD: ${PG_PASS:-weaver_pass}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-weaver} -d ${PG_DB:-novel_weaver}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ArcadeDB 多模型数据库 ──
  # CN 图 + 文档 + 向量 / JP グラフ+ドキュメント+ベクトル / EN Graph + Document + Vector
  arcadedb:
    image: arcadedb/arcadedb:25.4.1
    container_name: nw-arcadedb
    restart: unless-stopped
    networks: [novel-weaver-network]
    environment:
      ARCADEDB_SERVER_ROOT_PASSWORD: ${ARCADEDB_PASS:-weaver_pass}
    ports:
      - "${ARCADEDB_PORT:-2480}:2480"
      - "${ARCADEDB_BOLT_PORT:-2424}:2424"
    volumes:
      - arcadedbdata:/data
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:2480/api/v1/ready || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Meilisearch 全文搜索 ──
  # CN 模糊全文搜索 / JP 曖昧全文検索 / EN Fuzzy full-text search
  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: nw-meilisearch
    restart: unless-stopped
    networks: [novel-weaver-network]
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-novel-meili-master-key}
      MEILI_ENV: production
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── LanguageTool 语法检查 ──
  # CN 中文语法检查 / JP 文法チェック / EN Grammar check
  languagetool:
    image: silviof/languagetool:latest
    container_name: nw-languagetool
    restart: unless-stopped
    networks: [novel-weaver-network]
    environment:
      JAVA_XMS: 512m
      JAVA_XMX: 1024m
    ports:
      - "${LT_PORT:-8010}:8010"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8010/v2/languages || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  novel-weaver-network:
    external: true

volumes:
  pgdata:
  arcadedbdata:
  meilidata:
